pipeline:
  # Domain classification mode
  # auto = detected by Stage 1 classifier
  # Override with: academic-cs | academic-econ | academic-management |
  #   academic-humanities | academic-math | academic-social-science |
  #   journalistic | general
  domain_mode: auto

  # Claude API model selection
  rewrite_model: "claude-sonnet-4-6"
  analysis_model: "claude-haiku-4-5-20251001"

  # Temperature settings
  rewrite_temperature: 0.9      # Stages 2-4
  analysis_temperature: 0.3     # Stage 1 classification

  # Chunking (words per chunk, overlap in sentences)
  chunk_size_words: 300
  chunk_overlap_sentences: 1

  # Retry settings
  max_retries: 3
  retry_delay_seconds: 2

# Connector targets (new from corpus analysis)
connector_targets:
  but_however_ratio_min: 2.0        # Human baseline: 2:1 to 4:1
  connector_density_max: 0.8        # Per page (300 words); AI: 0.8-1.2
  additionally_allowed: false       # Absolute ban
  furthermore_max_per_doc: 1        # Near-ban
  moreover_max_per_500w: 1          # Rate-limited
  also_min_per_page: 0.08           # Minimum in academic text
  firstly_secondly_allowed: false   # Absolute ban

# Hedging targets
hedging_targets:
  modal_hedging_on_results_max: 0.0   # % of result sentences with modals
  isolated_modal_max_per_300w: 0.5    # Modals without attribution

# Structure targets
structure_targets:
  section_cv_min: 0.30            # Section word-count CV; AI: <0.15
  para_cv_min: 0.50               # Paragraph word-count CV
  sentence_cv_min: 0.45           # Sentence length CV
  length_reduction_ratio_max: 0.90
  conclusion_max_pct_of_body: 0.20  # Conclusion should be shortest section

# P7 context-aware scan
p7:
  context_aware: true
  # Words in absolute_ban are ALWAYS removed regardless of domain
  absolute_ban:
    - vibrant
    - nestled
    - breathtaking
    - tapestry
    - delve into
    - embark on
    - realm
    - harness
    - unlock
    - game-changer
    - seamless
    - synergy
    - cutting-edge
    - multifaceted
    - nuanced  # when used as generic intensifier
  # Context-dependent: only flag when (a) importance-framing position,
  # (b) ≥3 per 500 words, or (c) domain mismatch
  context_dependent:
    - crucial
    - key
    - important
    - significant
    - highlight
    - enhance
    - valuable
    - leverage
  # Importance-framing banlist (always remove regardless of domain)
  importance_framing_ban:
    - plays a crucial role
    - is central to
    - is pivotal for
    - is essential for
    - serves as a cornerstone of
    - is key to
    - is of vital importance
    - is fundamental to
    - is instructive about
    - deserves mention
    - is worth flagging
    - is worth a brief detour
    - is actually remarkable
  # Announcement opener banlist
  announcement_ban:
    - "Here's the problem with"
    - "is worth a brief detour"
    - "There's also a"
    - "worth flagging"
    - "also deserves mention"
    - "I mention this mostly because"
    - "is actually remarkable"
    - "is instructive about"
    - "repeats the same story"
  # Paired abstraction banlist
  paired_abstraction_ban:
    - opportunities and challenges
    - strengths and weaknesses
    - benefits and drawbacks
    - risks and rewards
    - pros and cons
    - advantages and disadvantages

# Scoring thresholds
scoring:
  perplexity_lift_min: 1.5          # Output perplexity / input perplexity
  sentence_cv_min: 0.45             # Sentence length burstiness
  pattern_elimination_rate_min: 0.85 # % of P1-P30 patterns removed
  coherence_min: 0.70               # Embedding cosine similarity
  para_cv_min: 0.50
  length_reduction_max: 0.90
  announcement_opener_target: 0
  triplet_target: 0
  para_ending_generalization_target: 0
  attributive_passive_target: 0
  but_however_ratio_min: 2.0
  connector_density_max: 0.8
  modal_hedging_on_results_max: 0.0
  section_cv_min: 0.30
  standalone_definition_target: 0
  source_evaluation_density_min: 0.30
  also_per_page_min: 0.08
  p7_context_violations_target: 0
  # Russian-specific scoring gates (AC-12, AC-15)
  skip_perplexity_for_russian: true              # AC-15: GPT-2 is English-only; skip for ru
  ru_no_odnako_ratio_target: 2.0                 # AC-12: mirrors p29_russian.target_no_odnako_ratio

# Citation density baselines by domain (per 20 pages)
citation_density_by_domain:
  law: 50
  linguistics: 10
  social-science: 7
  management: 10
  economics: 10
  cs: 5
  math: 1
  journalistic: 3
  general: 5

# First-person targets by domain
first_person_targets:
  math: we          # Collaborative proof voice — always
  cs: we-optional   # Optional we in methodology
  management: minimal   # 3-37 per document
  economics: minimal    # Low; functional
  humanities: moderate  # 5-50 per document
  social-science: moderate
  journalistic: high    # Acceptable throughout
  general: moderate

# P30 imperfection injection mode by register
p30_mode:
  academic: limited     # Only epistemic hedging, methodological asides, mild evaluative
  journalistic: full    # Full P30 toolkit
  casual: full
  professional: limited
  general: full         # Default fallback: apply full toolkit

# Human example injection for Stage 4 few-shot reference
examples:
  enabled: true
  dir: "/Users/arseniybelobzheskiy/Desktop/Examples with human text"
  cache_dir: ".examples_cache"
  excerpt_words: 400
  min_english_ratio: 0.60

# Local model settings
local_models:
  perplexity_model: "gpt2"
  perplexity_model_ru: null        # No Russian GPT-2; skip perplexity for ru
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  spacy_model: "en_core_web_sm"
  spacy_model_ru: "ru_core_news_sm"  # Install: python -m spacy download ru_core_news_sm

# ─── Phase 0: Academic Text Generation ─────────────────────────────────────
generator:
  enabled: true
  generation_model: "claude-sonnet-4-6"
  generation_temperature: 0.90
  max_tokens_per_section: 4096
  # Word targets per section per stream type
  section_word_targets:
    vkr:
      title_page: 0
      annotation: 250
      toc: 0
      introduction: 1500
      chapter: 3000         # Per chapter (typically 3 chapters)
      conclusion: 1500
      references: 0
    coursework:
      title_page: 0
      toc: 0
      introduction: 800
      chapter: 2500         # Per chapter (typically 2 chapters)
      conclusion: 800
      references: 0
    research:
      annotation: 250
      introduction: 600
      literature_review: 2000
      methodology: 800
      results: 1000
      discussion: 800
      conclusion: 500
      references: 0
    abstract_paper:
      title_page: 0
      toc: 0
      introduction: 400
      chapter: 1200
      conclusion: 400
      references: 0
    text:
      full: 1500
    essay:
      full: 1000
    composition:
      full: 400
  # Structural checks run on Phase 0 output before passing to Stage 1
  structural_check:
    max_announcement_openers: 0
    max_triplets: 0
    max_block12_violations: 0
    max_block7_red_flags: 2       # Allow up to 2 before triggering re-gen
    regen_on_hard_failure: true   # Re-generate section if check fails
    max_regen_attempts: 2
  # Megaprompt domain → pipeline domain code mapping
  domain_map:
    it_cs: cs
    law: general
    psychology: social-science
    economics: economics
    humanities: humanities
    media: journalistic
    general: general
  # Stream → pipeline register mapping
  register_map:
    vkr: academic
    coursework: academic
    research: academic
    abstract_paper: academic
    text: journalistic
    essay: academic-essay
    composition: general
  # Minimum source counts per stream (GOST requirements)
  source_minimums:
    vkr_bachelor: 50
    vkr_master: 60
    coursework: 20
    research: 30
    abstract_paper: 10
    text: 5
    essay: 5
    composition: 0

# ─── Phase 0A: Source Discovery ─────────────────────────────────────────────
source_finder:
  enabled: true
  generation_model: "claude-sonnet-4-6"
  generation_temperature: 0.3     # Low temperature for factual citation generation
  # Optional Semantic Scholar API validation (free, no key required)
  validate_via_semantic_scholar: false
  semantic_scholar_base_url: "https://api.semanticscholar.org/graph/v1"
  # Optional CrossRef validation (requires polite email)
  validate_via_crossref: false
  crossref_polite_email: null
  # Fuzzy title match threshold for API validation
  title_match_threshold: 0.85
  timeout_seconds: 10

# ─── Russian P7 Banlist ──────────────────────────────────────────────────────
p7_russian:
  # Words ALWAYS removed from Russian text regardless of domain
  absolute_ban:
    - "следует отметить"
    - "является ключевым"
    - "играет важную роль"
    - "необходимо подчеркнуть"
    - "представляется актуальным"
    - "в условиях современности"
    - "на сегодняшний день"
    - "в наше время"
    - "как известно"
    - "очевидно, что"
    - "вышесказанное свидетельствует"
    - "немаловажно также"
    - "актуальность темы заключается в том"
    - "данная проблема является актуальной"
    - "в рамках данной работы"
    - "подводя итог вышесказанному"
    - "таким образом можно заключить"
  # Importance-framing — always remove
  importance_framing_ban:
    - "играет важную роль в"
    - "является ключевым для"
    - "имеет принципиальное значение"
    - "занимает особое место в"
    - "заслуживает особого внимания"
    - "представляет собой важный"
    - "является основополагающим"
  # Announcement openers — always remove
  announcement_ban:
    - "следует отметить, что"
    - "необходимо отметить, что"
    - "важно подчеркнуть, что"
    - "стоит отметить, что"
    - "обратим внимание на то"
    - "отметим, что"
    - "необходимо указать, что"
    - "хотелось бы отметить"

# ─── Russian P29 Connector Rules ────────────────────────────────────────────
p29_russian:
  # Absolute ban (0 per document)
  absolute_ban:
    - "во-первых"
    - "во-вторых"
    - "в-третьих"
    - "помимо этого"
    - "в дополнение к вышесказанному"
  # Near-ban (≤ 1 per full document)
  near_ban_max_per_doc:
    "кроме того": 1
  # Rate-limited (≤ 1 per 500 words)
  rate_limited_per_500w:
    "более того": 1
    "помимо прочего": 1
  # Permitted connectors (not banned)
  permitted:
    - "также"
    - "однако"
    - "но"
    - "при этом"
    - "между тем"
    - "тем не менее"
    - "вместе с тем"
    - "таким образом"
    - "следовательно"
  # Actively encouraged (human baseline)
  encouraged:
    - "также"
    - "но"
    - "однако"
  # Target Но:Однако ratio (analogous to English But:However)
  target_no_odnako_ratio: 2.0

# ─── Structural stage settings ─────────────────────────────────────────────
structural:
  em_dash_ru_max_per_paragraph: 3       # AC-1: max excess (non-copular) em dashes per paragraph in Russian

# ─── Discourse stage settings ────────────────────────────────────────────────
discourse:
  # Passive voice thresholds by language+register (AC-4)
  default_passive_threshold: 0.20               # English (any register)
  academic_ru_passive_threshold: 0.70            # Russian academic — domain norm is 50%+
  academic_essay_ru_passive_threshold: 0.50      # Russian academic-essay — intermediate
  journalistic_ru_passive_threshold: 0.30        # Russian journalistic — moderate tolerance

# ─── Word (.docx) Output Formatter ──────────────────────────────────────────
formatter:
  # GOST 7.32-2017 formatting (for academic/academic-essay register)
  gost_font: "Times New Roman"
  gost_font_size: 14
  gost_line_spacing: 1.5
  gost_indent_cm: 1.25                # First-line indent for body paragraphs
  gost_margins:                       # All in centimeters
    left: 3.0
    right: 1.5
    top: 2.0
    bottom: 2.0
  gost_heading1_size: 14              # Chapter headings (BOLD, UPPERCASE)
  gost_heading2_size: 14              # Section headings (BOLD)
  gost_heading3_size: 14             # Subsection headings (regular)
  # Free formatting (for journalistic/general register)
  free_font: "Calibri"
  free_font_size: 11
  free_line_spacing: 1.15
  free_margins:                       # All in centimeters
    all: 2.5
  free_indent_cm: 0                   # No first-line indent in free format
